spring:
  application:
    name: smartshelf-api
  datasource:
    url: ${MYSQL_URL:${SPRING_DATASOURCE_URL:}}
    username: ${MYSQL_USERNAME:${SPRING_DATASOURCE_USERNAME:}}
    password: ${MYSQL_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
  google-books:
    api-key: ${GOOGLE_BOOKS_API_KEY}
    base-url: https://www.googleapis.com/books/v1
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info
